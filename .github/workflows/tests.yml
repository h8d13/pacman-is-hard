name: tests

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'aptac'
      - 't/**'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'aptac'
      - 't/**'
      - '.github/workflows/tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      # The suite runs the real tools, so install them and leave a synced db.
      # pacman-contrib provides checkupdates/paccache/pactree; checkupdates
      # shells out to fakeroot at runtime. reflector ranks mirrors. The tiny
      # "tree" pkg the install/orphs tests use is pulled on demand (db synced here).
      - name: Install deps and sync db
        shell: bash
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed pacman-contrib reflector fakeroot \
            bash diffutils grep sed coreutils

      # -v dumps each script's full log inline so failures are debuggable in the
      # Actions console. The suite is CI-only (it mutates the system); the
      # container is disposable and root, which is exactly what it needs.
      - name: Run test suite
        shell: bash
        run: sh t/run.sh -v
